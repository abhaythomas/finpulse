# .github/workflows/daily_report.yml
#
# Runs every day at 8:00 AM IST (2:30 AM UTC)
# IST is UTC+5:30, so 8:00 AM IST = 2:30 AM UTC
#
# Can also be triggered manually from the GitHub Actions tab

name: Daily Portfolio Report

on:
  schedule:
    - cron: '30 2 * * 1-5'  # 2:30 AM UTC = 8:00 AM IST, weekdays only (markets closed on weekends)
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FinPulse agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python main.py
